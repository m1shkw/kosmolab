<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOSMOLAB — Главная</title>

    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/variables.css">
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="./css/adaptive.css">

    <script src="./js/main.js" defer></script>
</head>

<body>
    <div class="page">
        <header class="header">
            <a class="header__logo" href="./index.html" aria-label="KOSMOLAB — главная">
                <img class="header__logo-icon" src="./assets/images/ui/kosmolab-logo-icon.svg" alt="">
                <span class="header__logo-text">KOSMOLAB</span>
            </a>

            <nav class="nav" aria-label="Основная навигация">
                <a class="nav__link is-active" href="./index.html">Главная</a>
                <a class="nav__link" href="./catalog.html">Каталог</a>
                <a class="nav__link" href="./events.html">Мероприятия</a>
                <a class="nav__link" href="./about.html">О нас</a>
                <a class="nav__link" href="./guide.html">Руководство</a>
            </nav>

            <button class="button mobile-menu-button" type="button">
                Меню
            </button>
        </header>

        <main>
            <section class="hero-screen">
                <div class="hero-screen__inner">
                    <div class="hero-screen__visual">
                        <img class="hero-screen__bg" src="./assets/images/hero/hero-bg.svg" alt="" aria-hidden="true">

                        <img class="hero-screen__planet hero-screen__planet--main" src="./assets/images/hero/planet-main.png" alt="" aria-hidden="true">
                        <img class="hero-screen__planet hero-screen__planet--small" src="./assets/images/hero/planet-small.png" alt="" aria-hidden="true">

                        <div class="hero-callout hero-callout--top">
                            <span class="hero-callout__circle"></span>
                            <img class="hero-callout__line" src="./assets/images/hero/line-top-right.svg" alt="" aria-hidden="true">
                            <span class="hero-callout__text">Домашние системы нового поколения</span>
                        </div>

                        <div class="hero-callout hero-callout--bottom">
                            <span class="hero-callout__text">Разработка миниатюрных биом</span>
                            <img class="hero-callout__line" src="./assets/images/hero/line-bottom-left.svg" alt="" aria-hidden="true">
                            <span class="hero-callout__circle"></span>
                        </div>

                        <div class="hero-screen__content">
                            <img class="hero-screen__logo hero-screen__logo--desktop" src="./assets/images/hero/KOSMOLAB-logo-pc.svg" alt="KOSMOLAB">
                            <img class="hero-screen__logo hero-screen__logo--tablet" src="./assets/images/hero/KOSMOLAB-logo-tb.svg" alt="KOSMOLAB">
                            <img class="hero-screen__logo hero-screen__logo--mobile" src="./assets/images/hero/KOSMOLAB-logo-mb.svg" alt="KOSMOLAB">

                            <p class="hero-screen__lead">Лаборатория по&nbsp;созданию мини-планет - ночников у&nbsp;себя&nbsp;дома</p>
                        </div>
                    </div>

                    <div class="hero-screen__buttons">
                        <a class="button button--solid" href="./catalog.html">
                            Каталог →
                        </a>

                        <a class="button button--outline" href="./catalog.html#constructor">
                            Конструктор →
                        </a>
                    </div>
                </div>
            </section>
        </main>

        <footer class="footer">
            <nav class="footer__nav" aria-label="Навигация в подвале">
                <a href="./index.html">Главная</a>
                <a href="./catalog.html">Каталог</a>
                <a href="./guide.html">Руководство</a>
                <a href="./events.html">Мероприятия</a>
                <a href="./about.html">О&nbsp;нас</a>
            </nav>

            <div class="footer__meta">
                <span>АП&nbsp;4М&nbsp;2026</span>
                <span>Рачинская&nbsp;М.&nbsp;Ю.</span>
            </div>

            <div class="footer__credits">
                <span>Куратор</span>
                <span>Умнова&nbsp;Е.&nbsp;А.</span>
            </div>
        </footer>
    </div>
</body>
</html>
